<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta de Amor</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.envelope{
    width:250px;
    height:180px;
    background:#ff4d6d;
    position:relative;
    cursor:pointer;
    border-radius:5px;
    animation:pulse 2s infinite;
}

.envelope:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:125px solid transparent;
    border-right:125px solid transparent;
    border-top:90px solid #ff758f;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

.letter{
    position:absolute;
    width:350px;
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    display:none;
    box-shadow:0 0 25px rgba(0,0,0,.3);
}

h1{
    color:#ff4d6d;
}

.buttons{
    margin-top:20px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:relative;
}

.hearts{
    position:relative;
    width:120px;
    height:120px;
    margin:auto;
}

.hearts span{
    position:absolute;
    left:50%;
    top:50%;
    font-size:35px;
    transform-origin:0 0;
}

.hearts span:nth-child(1){
    animation:orbit1 4s linear infinite;
}

.hearts span:nth-child(2){
    animation:orbit2 4s linear infinite;
}

@keyframes orbit1{
    from{transform:rotate(0deg) translateX(50px);}
    to{transform:rotate(360deg) translateX(50px);}
}

@keyframes orbit2{
    from{transform:rotate(180deg) translateX(50px);}
    to{transform:rotate(540deg) translateX(50px);}
}

.rain-heart{
    position:absolute;
    top:-50px;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

.final{
    display:none;
    text-align:center;
}

.final h2{
    color:#ff4d6d;
}
</style>
</head>
<body>

<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">

    <div class="hearts">
        <span>❤️</span>
        <span>❤️</span>
    </div>

    <h1>Uma Pergunta ❤️</h1>

    <p>
    Você aceita receber todo meu carinho,
    atenção e amor hoje e sempre?
    </p>

    <div class="buttons">
        <button id="yes" onclick="acceptLove()">Sim ❤️</button>
        <button id="no">Não 😢</button>
    </div>

    <div class="final" id="final">
        <h2>🥰 Você aceitou!</h2>
        <p>
        Agora os dois corações estarão unidos para sempre ❤️
        </p>
        <h1>💖 Eu Te Amo 💖</h1>
    </div>

</div>

<script>
function openLetter(){
    document.querySelector(".envelope").style.display="none";
    document.getElementById("letter").style.display="block";
}

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{
    const x = Math.random()*(window.innerWidth-100);
    const y = Math.random()*(window.innerHeight-100);

    noBtn.style.position="fixed";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
});

function acceptLove(){
    document.querySelector(".buttons").style.display="none";
    document.getElementById("final").style.display="block";
}

function createHeart(){
    const heart=document.createElement("div");
    heart.className="rain-heart";
    heart.innerHTML="💖";

    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,250);
</script>

</body>
</html>
